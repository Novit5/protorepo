<!DOCTYPE html>
<html>
<head>
  <title>List of User - Activity Monitoring System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="main-content user-list-content">
  <h1>List of User</h1>

  <p class="form-message info" id="user-list-message" aria-live="polite">Loading users...</p>

  <section class="table-panel user-edit-panel is-hidden" id="user-edit-panel" aria-labelledby="user-edit-title">
    <h2 id="user-edit-title">Edit User</h2>
    <form class="user-edit-form" id="user-edit-form">
      <input type="hidden" id="edit-user-id">

      <label for="edit-fullname">Fullname</label>
      <input type="text" id="edit-fullname" required>

      <label for="edit-email">Email</label>
      <input type="email" id="edit-email" readonly>

      <label for="edit-password">Password</label>
      <input type="password" id="edit-password" placeholder="Leave blank to keep current password">

      <label for="edit-user-role">User Role</label>
      <select id="edit-user-role" required>
        <option value="1">Admin</option>
        <option value="2">Program Manager</option>
      </select>

      <label for="edit-user-stat">Status</label>
      <select id="edit-user-stat" required>
        <option value="1">Active</option>
        <option value="2">Inactive</option>
      </select>

      <div class="form-actions">
        <button type="submit">Save Changes</button>
        <button type="button" class="button-secondary" id="cancel-edit-button">Cancel</button>
      </div>
    </form>
  </section>

  <section class="table-panel" aria-labelledby="user-list-title">
    <h2 id="user-list-title">Registered Users</h2>
    <div class="table-scroll">
      <table class="user-data-table">
        <thead>
          <tr>
            <th>Fullname</th>
            <th>Email</th>
            <th>User Role</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="user-list-body"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const userRole = localStorage.getItem("user_role");
  const sidebarFile = userRole === "2" ? "sidebar-user.html" : "sidebar.html";

  fetch(sidebarFile)
    .then(response => response.text())
    .then(html => {
      const sidebarContainer = document.getElementById("sidebar-container");
      sidebarContainer.innerHTML = html;

      sidebarContainer.querySelectorAll(".sidebar-nav a").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === "user-list.html");
      });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="user-list.js"></script>
</body>
</html>
