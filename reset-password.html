<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - Activity Monitoring System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="reset-title">
      <div class="login-brand">
        <span class="brand-mark">M</span>
        <span>Monitoring</span>
      </div>

      <h1 id="reset-title">Reset password</h1>
      <p class="login-subtitle">Enter a new password for your account.</p>

      <form class="login-form" id="reset-password-form">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" name="new-password" placeholder="Create a new password" required>

        <label for="confirm-new-password">Confirm new password</label>
        <input type="password" id="confirm-new-password" name="confirm-new-password" placeholder="Confirm your new password" required>

        <button type="submit">Update password</button>
      </form>

      <p class="form-message" id="reset-password-message" aria-live="polite"></p>

      <p class="auth-switch">
        Remember your password?
        <a href="login.html">Sign in</a>
      </p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
