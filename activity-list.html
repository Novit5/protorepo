<!DOCTYPE html>
<html>
<head>
  <title>List of Activity - Activity Monitoring System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="main-content activity-list-content">
  <h1>List of Activity</h1>

  <p class="form-message info" id="activity-list-message" aria-live="polite">Loading activities...</p>

  <section class="table-panel" aria-labelledby="activity-list-title">
    <h2 id="activity-list-title">Activities</h2>
    <div class="table-scroll">
      <table class="activity-data-table">
        <thead>
          <tr>
            <th>Activity/Title</th>
            <th>Program Manager</th>
            <th>Program</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Venue</th>
            <th>Project Proposal</th>
            <th>Logistics needed</th>
            <th>Vehicle</th>
            <th>Cost/Amount</th>
            <th>Source of Fund</th>
            <th>Purchase Request</th>
            <th>Purchase Order</th>
            <th>Status of Payment</th>
            <th>Liquidation</th>
            <th>Status</th>
            <th>Remarks</th>
            <th>MOV</th>
          </tr>
        </thead>
        <tbody id="activity-list-body"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const userRole = localStorage.getItem("user_role");
  const sidebarFile = userRole === "2" ? "sidebar-user.html" : "sidebar.html";

  fetch(sidebarFile)
    .then(response => response.text())
    .then(html => {
      const sidebarContainer = document.getElementById("sidebar-container");
      sidebarContainer.innerHTML = html;

      sidebarContainer.querySelectorAll(".sidebar-nav a").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === "activity-list.html");
      });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="activity-list.js"></script>
</body>
</html>
