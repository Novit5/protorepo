<!DOCTYPE html>
<html>
<head>
  <title>Activity Monitoring System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="main-content">
<h1>Monitoring Prototype</h1>

<form id="form">
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="activity" placeholder="Activity" required>
  
  <select id="status">
    <option>Pending</option>
    <option>Ongoing</option>
    <option>Completed</option>
  </select>

  <button type="submit">Add Activity</button>
</form>

<h2 id="activity-list">Activity List</h2>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Activity</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
</main>

<script>
  const userRole = localStorage.getItem("user_role");
  const sidebarFile = userRole === "2" ? "sidebar-user.html" : "sidebar.html";

  fetch(sidebarFile)
    .then(response => response.text())
    .then(html => {
      document.getElementById("sidebar-container").innerHTML = html;
    });
</script>
<script src="app.js"></script>
</body>
</html>
